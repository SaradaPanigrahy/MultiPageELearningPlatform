<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       
        .profile-card {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .profile-card h2 {
            margin-bottom: 25px;
            text-align: center;
        }
        .form-label {
            font-weight: 500;
        }
        .completed-courses {
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            min-height: 50px;
        }
        .btn-space {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <header>
    <nav class="navbar navbar-expand-lg fixed-top navbar-light bg-light">

        <div class="container-fluid">

            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 custom-breadcrumb">

                <li class="breadcrumb-item">
                <a href="DashBoard.html">Home</a>
                </li>

                <li class="breadcrumb-item active fw-bold">
                Profile
                </li>
                </ol>
            </nav>
        </div>
    </nav>
</header>

<div class="profile-card">
    <h2>Profile</h2>
    <form id="profileForm">
        <!-- Name -->
        <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="Enter full name">
        </div>

        <!-- User ID -->
        <div class="mb-3">
            <label for="userid" class="form-label">User ID</label>
            <input type="text" class="form-control" id="userid" placeholder="Enter user ID">
        </div>

        <!-- Mobile Number -->
        <div class="mb-3">
            <label for="mobile" class="form-label">Mobile Number</label>
            <input type="tel" class="form-control" id="mobile" placeholder="Enter mobile number">
        </div>

        <!-- Email ID -->
        <div class="mb-3">
            <label for="email" class="form-label">Email ID</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email">
        </div>

        <!-- Completed Courses -->
        <div class="mb-3">
            <label class="form-label">Completed Courses</label>
            <div id="completedCourses" class="completed-courses">
                None
            </div>
        </div>

        <!-- Change Password -->
        <div class="mb-3">
            <label for="password" class="form-label">Change Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter new password">
        </div>

        <!-- Buttons -->
        <div class="text-center">
            <button type="button" class="btn btn-primary btn-space" id="updateInfo">Update Info</button>
            <button type="button" class="btn btn-success" id="updatePassword">Update Password</button>
        </div>
    </form>
</div>


<script>
    // ------------------- Load user data (can use localStorage or defaults) -------------------
    let userData = JSON.parse(localStorage.getItem("userProfile")) || {
        name: "Sarada Panigrahy",
        userid: "SP12345",
        mobile: "9876543210",
        email: "sarada@example.com"
    };

    // Populate input fields
    document.getElementById("name").value = userData.name;
    document.getElementById("userid").value = userData.userid;
    document.getElementById("mobile").value = userData.mobile;
    document.getElementById("email").value = userData.email;

    // ------------------- Load completed courses from localStorage -------------------
    const completedCoursesDiv = document.getElementById("completedCourses");
    const completedCourses = JSON.parse(localStorage.getItem("completedCourses")) || [];
    completedCoursesDiv.innerText = completedCourses.length > 0 ? completedCourses.join(", ") : "None";

    // ------------------- Update Info Button -------------------
    document.getElementById("updateInfo").addEventListener("click", function() {
        userData.name = document.getElementById("name").value;
        userData.userid = document.getElementById("userid").value;
        userData.mobile = document.getElementById("mobile").value;
        userData.email = document.getElementById("email").value;

        localStorage.setItem("userProfile", JSON.stringify(userData));
        alert(" Profile info updated!");
    });

    // ------------------- Update Password Button -------------------
    document.getElementById("updatePassword").addEventListener("click", function() {
        const newPass = document.getElementById("password").value;
        if(newPass.trim() === "") {
            alert("Please enter a new password.");
            return;
        }

        // Save password to localStorage (for demo only; never store plain passwords in real apps!)
        localStorage.setItem("userPassword", newPass);
        alert("Password updated!");
        document.getElementById("password").value = "";
    });
    </script>
</body>
</html>
