<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" >
    <link rel="stylesheet" href="style.css">
</head>
</head>
<body>
    <header>
    <nav class="navbar navbar-expand-lg fixed-top navbar-light bg-light">

        <div class="container-fluid">

            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 custom-breadcrumb">

                <li class="breadcrumb-item">
                <a href="DashBoard.html">Home</a>
                </li>

                <li class="breadcrumb-item active fw-bold">
                Progress
                </li>

                </ol>
            </nav>

        </div>
    </nav>
</header>

<br><br>
<section class="card-section">
<div class="course-cards">

    <div class="course-card">
       <i class="fa-solid fa-video fa-2x  mb-2"></i>
        <p id="LectureWatched">0</p>
        <h4>LectureWatched</h4>
     
    </div>

    <div class="course-card">
        <i class="fa-regular fa-clock fa-2x mb-2"></i>
        <p id="watchDur">0</p>
        <h4>Watch Duration</h4>
    </div>

    <div class="course-card">
        <i class="fa-regular fa-circle-question fa-2x  mb-2"></i>
         <p id="QuizzMark">0</p>
        <h4>Quizz Mark</h4>
       
    </div>

</div>
</section>

<div class="chart-box">
<h4 class="text-center">Overall Course Progress</h4>
<canvas id="progressChart"  width="300" height="300"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="progress.js"></script>
</body>
</html>
